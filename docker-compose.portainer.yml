services:
  home-utility-ledger:
    image: ghcr.io/saarjoye/home-utility-ledger-standalone:latest
    container_name: home-utility-ledger
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: CHANGE_ME_STRONG_PASSWORD
      APP_DATA_DIR: /data
      TZ: Asia/Shanghai
    volumes:
      - /home/docker/home-utility-ledger:/data
