services:
  app:
    image: ghcr.io/saarjoye/home-utility-ledger:main
    container_name: home-utility-ledger
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      APP_ENTRY: ${APP_ENTRY:-src/server.mjs}
      DB_PATH: ${DB_PATH:-data/app.db}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-admin}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-session-secret}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ACCOUNT_CREDENTIALS_SECRET: ${ACCOUNT_CREDENTIALS_SECRET:-change-me-account-credentials-secret}
      AUTO_COLLECT_ENABLED: ${AUTO_COLLECT_ENABLED:-true}
      COLLECTOR_TICK_MS: ${COLLECTOR_TICK_MS:-60000}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - /home/docker/home-utility-ledger/data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
