<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>后台配置 - 家庭账单</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">家庭账单 <small>Standalone</small></div>
        <nav class="nav">
          <a href="/index.html">账单看板</a>
          <a href="/analytics.html">统计分析</a>
          <a class="active" href="/admin.html">后台配置</a>
        </nav>
      </aside>
      <main class="main">
        <div class="topbar">
          <div>
            <h1>后台配置</h1>
            <p class="sub">新版 Standalone 2026.05.15.13 · 配置采集来源、定时任务和企业微信推送。每个渠道只保留必要操作。</p>
          </div>
          <button class="btn" id="saveSettings">保存配置</button>
        </div>
        <section class="grid-2">
          <div>
            <h2 style="margin-bottom:14px">账号接入</h2>
            <div class="list" id="providerCards"></div>
          </div>
          <div class="list">
            <div class="card">
              <h2>自动采集</h2>
              <div class="form-grid" id="jobsForm" style="margin-top:14px"></div>
              <p class="helper" style="margin-top:12px">失败后自动记录日志；连续失败时按推送配置提醒。</p>
            </div>
            <div class="card">
              <h2>企业微信推送</h2>
              <div class="form-grid" style="margin-top:14px">
                <label>Webhook 地址<input class="input" id="wecomWebhook" placeholder="https://qyapi.weixin.qq.com/cgi-bin/webhook/..."></label>
                <label><input type="checkbox" id="pushDaily"> 每日汇总</label>
                <label><input type="checkbox" id="pushFailure"> 采集失败提醒</label>
              </div>
            </div>
            <div class="card">
              <h2>接入向导</h2>
              <p class="helper" style="margin-top:14px">1. 选择渠道。<br>2. 按提示完成登录或打开账单页。<br>3. 导入系统生成的登录信息或抓包文件。<br>4. 点击测试连接。<br>5. 保存后进入自动采集。</p>
            </div>
          </div>
        </section>
      </main>
    </div>
    <dialog id="importDialog" style="width:min(760px, 92vw); border:0; border-radius:24px; padding:0">
      <form method="dialog" class="card" style="box-shadow:none">
        <h2 id="dialogTitle">导入</h2>
        <p class="helper" id="dialogHelp" style="margin:10px 0 14px"></p>
        <div id="scriptBox" class="script-box" hidden>
          <div class="script-box-head">
            <strong>浏览器控制台脚本</strong>
            <button class="btn secondary" id="copyScript" type="button">复制脚本</button>
          </div>
          <textarea id="scriptContent" readonly></textarea>
          <p class="helper">复制脚本到国网页面控制台执行。执行后通常会自动复制 JSON；如果没有自动复制，请复制控制台里打印出的完整 JSON。</p>
        </div>
        <textarea id="importContent" placeholder="粘贴导出内容，或粘贴完整 HAR JSON"></textarea>
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:14px">
          <button class="btn secondary" value="cancel">取消</button>
          <button class="btn" id="confirmImport" value="default">导入</button>
        </div>
      </form>
    </dialog>
    <div class="toast" id="toast"></div>
    <script src="/app.js"></script>
  </body>
</html>
