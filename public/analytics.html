<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>费用详情 - 家庭能源账本</title>
    <link rel="stylesheet" href="/styles.css?v=20260517-operational-ui">
  </head>
  <body>
    <div class="mobile-detail detail-shell">
      <header class="detail-header">
        <a href="/index.html">‹</a>
        <h1 id="detailTitle">费用信息</h1>
        <span>•••</span>
      </header>

      <section class="detail-hero" id="detailHero">
        <div class="kv-row"><span>刷新时间</span><b id="detailRefresh">--</b></div>
        <div class="kv-row"><span>当前账期</span><b id="detailPeriod">--</b></div>
        <div class="hero-amount"><span id="detailAmountLabel">本期费用</span><strong id="detailAmount">¥ 0.00</strong></div>
      </section>

      <section class="detail-status-strip" id="detailStatusStrip"></section>

      <section class="warning-banner detail-warning-banner" id="detailWarningBanner" hidden></section>

      <section class="detail-metrics" id="detailMetrics"></section>

      <section class="detail-card" id="detailFilterCard">
        <div class="panel-head">
          <h2>统计范围</h2>
          <span id="detailRangeLabel">--</span>
        </div>
        <div class="period-navigator" id="periodNavigator">
          <button class="btn secondary" id="periodPrev" type="button">‹</button>
          <div>
            <span id="periodNavLabel">当前月份</span>
            <b id="periodNavValue">--</b>
          </div>
          <button class="btn secondary" id="periodNext" type="button">›</button>
        </div>
        <div class="range-tabs mobile" id="detailRangeTabs">
          <button data-period="day">日</button>
          <button data-period="week">周</button>
          <button data-period="month" class="active">月</button>
          <button data-period="quarter">季</button>
          <button data-period="year">年</button>
          <button data-period="custom">自定义</button>
        </div>
        <div class="detail-tools">
          <input class="input" id="detailSearch" placeholder="搜索账期、金额或来源">
          <select class="input" id="detailPageSize">
            <option value="20">每页 20 条</option>
            <option value="50">每页 50 条</option>
            <option value="100">每页 100 条</option>
          </select>
        </div>
        <div class="inline-custom-range" id="detailCustomRange" hidden>
          <strong>自定义统计时段</strong>
          <div>
            <label>开始日期<input class="input" id="detailCustomStart" type="date"></label>
            <label>结束日期<input class="input" id="detailCustomEnd" type="date"></label>
          </div>
          <button class="btn" id="applyDetailCustomRange" type="button">应用自定义时段</button>
        </div>
      </section>

      <section class="detail-card" id="detailCalendarCard">
        <div class="panel-head">
          <h2>用电日历</h2>
          <span id="detailCalendarMonth">--</span>
        </div>
        <div class="weekday-row"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
        <div class="calendar-grid mobile-calendar" id="detailCalendar"></div>
      </section>

      <section class="detail-card" id="periodInfoCard">
        <h2 id="periodInfoTitle">账期明细</h2>
        <div class="info-list" id="periodInfo"></div>
      </section>

      <section class="detail-card" id="detailTrendCard">
        <h2 id="detailTrendTitle">近期趋势</h2>
        <div class="detail-chart-viewport">
          <div class="bars compact detail-bars" id="analyticsBars"></div>
        </div>
      </section>

      <section class="detail-card" id="detailBillsCard">
        <div class="panel-head">
          <h2 id="detailBillTitle">账单列表</h2>
          <span id="detailBillCount">--</span>
        </div>
        <div class="bill-list" id="analyticsRows"></div>
        <div class="detail-pager" id="detailPager"></div>
      </section>
    </div>

    <div class="toast" id="toast"></div>
    <script src="/app.js?v=20260517-operational-ui"></script>
  </body>
</html>
