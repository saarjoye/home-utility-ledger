<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>家庭账单看板</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">家庭账单 <small>Standalone</small></div>
        <nav class="nav">
          <a class="active" href="/index.html">账单看板</a>
          <a href="/analytics.html">统计分析</a>
          <a href="/admin.html">后台配置</a>
        </nav>
        <div class="side-status" id="sideStatus">正在读取采集状态...</div>
      </aside>
      <main class="main">
        <div class="topbar">
          <div>
            <h1>本月家庭能源账单</h1>
            <p class="sub" id="updatedAt">新版 Standalone 2026.05.15.8 · 展示最近一次成功采集的数据</p>
          </div>
          <button class="btn" id="collectAll">立即采集</button>
        </div>
        <section class="grid-4" id="summaryCards"></section>
        <section class="grid-2" style="margin-top:18px">
          <div class="card chart-card">
            <h2>费用趋势</h2>
            <div class="bars" id="bars"></div>
          </div>
          <div class="list">
            <div class="card">
              <h2>采集状态</h2>
              <div class="list" id="accountStatus" style="margin-top:14px"></div>
            </div>
            <div class="card">
              <h2>最近账单</h2>
              <div class="list" id="recentBills" style="margin-top:14px"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <div class="toast" id="toast"></div>
    <script src="/app.js"></script>
  </body>
</html>
