<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>家庭能源账本</title>
    <link rel="stylesheet" href="/styles.css?v=20260517-operational-ui">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <a class="brand-lockup" href="/index.html">
          <span class="brand-icon">↯</span>
          <span><strong>家庭能源账本</strong><small>水 · 电 · 燃自动采集与费用分析</small></span>
        </a>
        <a class="btn secondary header-btn" href="/admin.html">后台管理</a>
      </header>

      <main class="dashboard-grid">
        <aside class="left-rail">
          <section class="total-card">
            <p>本月费用概览</p>
            <strong id="monthTotal">¥ 0.00</strong>
            <span id="monthBreakdown">电 0.00 · 水 0.00 · 燃 0.00</span>
            <div class="total-meta">
              <b id="connectedCount">0 个渠道已接入</b>
              <span id="lastCollect">最后采集 --</span>
            </div>
          </section>

          <section class="panel-card">
            <h2>采集状态</h2>
            <div class="status-list" id="sideStatus">正在读取采集状态...</div>
          </section>

          <section class="panel-card">
            <h2>快捷操作</h2>
            <div class="quick-actions">
              <button class="soft-action" id="collectAll">立即采集全部渠道 <span>↻</span></button>
              <a class="soft-action warn" href="/admin.html">查看需要重新授权账号 <span>盾</span></a>
            </div>
          </section>

          <section class="panel-card channel-switch-card">
            <h2>数据视图</h2>
            <p class="helper">选择后右侧内容会切换为对应平台数据。</p>
            <nav class="side-channel-nav" id="dashboardViewTabs" aria-label="数据视图">
              <button class="active" type="button" data-view="overview"><span>总览</span><small>三项汇总</small></button>
              <button type="button" data-view="electricity"><span>电费详情</span><small>日用电 · 月账单</small></button>
              <button type="button" data-view="water"><span>水费详情</span><small>账期 · 用水量</small></button>
              <button type="button" data-view="gas"><span>燃气详情</span><small>账期 · 用气量</small></button>
            </nav>
          </section>
        </aside>

        <section class="content-area">
          <section class="trust-strip" id="trustStrip"></section>

          <section class="warning-banner" id="warningBanner" hidden></section>

          <section class="utility-cards" id="summaryCards"></section>

          <section class="range-card">
            <div>
              <h2>统计时间</h2>
              <p id="rangeText">当前：本月</p>
            </div>
            <div class="range-tabs" id="rangeTabs">
              <button data-period="day">日</button>
              <button data-period="week">周</button>
              <button data-period="month" class="active">月</button>
              <button data-period="quarter">季</button>
              <button data-period="year">年</button>
              <button data-period="custom">自定义</button>
            </div>
            <div class="range-switch">
              <button id="prevRange" type="button">‹</button>
              <strong id="rangeLabel">--</strong>
              <button id="nextRange" type="button">›</button>
            </div>
            <div class="inline-custom-range dashboard-custom-range" id="dashboardCustomRange" hidden>
              <strong>自定义统计时段</strong>
              <div>
                <label>开始日期<input class="input" id="dashboardCustomStart" type="date"></label>
                <label>结束日期<input class="input" id="dashboardCustomEnd" type="date"></label>
              </div>
              <button class="btn" id="applyDashboardCustomRange" type="button">应用自定义时段</button>
            </div>
          </section>

          <section class="main-panels">
            <div class="panel-card usage-panel">
              <div class="panel-head">
                <h2 id="mainDataTitle">电费用量日历</h2>
                <span id="calendarMonth">--</span>
              </div>
              <p class="helper data-note" id="mainDataNote">日历展示已落盘的日用电量；单日费用通常需要等待国网月账单出账。</p>
              <div class="weekday-row" id="desktopWeekdays"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
              <div class="calendar-grid" id="electricCalendar"></div>
            </div>

            <div class="panel-card details-panel">
              <div class="panel-head">
                <h2 id="billPanelTitle">电费详细账单</h2>
              </div>
              <div class="mini-tabs" id="billTypeTabs">
                <button class="active" data-type="electricity">电</button>
                <button data-type="water">水</button>
                <button data-type="gas">燃</button>
              </div>
              <div class="trend-card">
                <h3 id="trendTitle">近 7 日用电趋势</h3>
                <div class="bars compact" id="bars"></div>
              </div>
              <div class="bill-list" id="recentBills"></div>
            </div>
          </section>
        </section>
      </main>
    </div>

    <div class="toast" id="toast"></div>
    <script src="/app.js?v=20260517-operational-ui"></script>
  </body>
</html>
