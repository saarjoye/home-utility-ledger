<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭水电燃账本 - 登录</title>
  <link rel="stylesheet" href="./admin.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-box">
      <div class="brand-mark">U</div>
      <h1>家庭水电燃账本</h1>
      <p class="login-subtitle">参考 Lucky Bridge 的后台登录风格，改为本项目专用的管理员会话登录。</p>

      <form id="loginForm" class="login-form">
        <label class="field-label" for="usernameInput">管理员账号</label>
        <input id="usernameInput" name="username" type="text" autocomplete="username" placeholder="请输入管理员账号" required autofocus>

        <label class="field-label" for="passwordInput">管理员密码</label>
        <input id="passwordInput" name="password" type="password" autocomplete="current-password" placeholder="请输入管理员密码" required>

        <div class="alert-box hidden" id="loginError"></div>

        <button class="btn btn-primary btn-block" id="loginButton" type="submit">登录后台</button>
      </form>
    </div>
  </div>

  <script src="./login.js"></script>
</body>
</html>
