<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - 家庭账单</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="login-page">
      <section class="login-hero">
        <div class="brand-pill">Home Utility Ledger · Standalone 2026.05.15.11</div>
        <h1>水电燃账单<br>自动采集与家庭费用台账</h1>
        <p>自建 Docker 部署，集中管理国网浙江、杭州市水务、杭州天然气账单采集、统计分析与企业微信推送。</p>
        <div class="badge-row">
          <div class="badge">每日自动采集</div>
          <div class="badge">企业微信推送</div>
        </div>
      </section>
      <section class="login-panel">
        <form class="login-card" id="loginForm" method="post" action="/api/login">
          <h1>登录后台</h1>
          <p class="sub">使用管理员账号进入系统。首次部署后请立即修改默认密码。</p>
          <div class="form-grid" style="margin-top:22px">
            <label>账号<input class="input" name="username" value="admin" autocomplete="username"></label>
            <label>密码<input class="input" name="password" type="password" autocomplete="current-password"></label>
            <button class="btn" type="submit">进入系统</button>
            <p class="helper">安全策略：未登录访问任何页面都会跳转到登录页。</p>
          </div>
        </form>
      </section>
    </main>
    <div class="toast" id="toast"></div>
    <script src="/login.js"></script>
  </body>
</html>
